trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Install and build frontend
- script: |
    npm install
    npm run build
  displayName: 'Install and build frontend'

# Install backend dependencies
- script: |
    cd server
    npm install
    npm install typescript -g
  displayName: 'Install backend dependencies'

# Clean old frontend build from backend
- script: |
    rm -rf server/dist
  displayName: 'Clean old frontend build from backend'

# Copy frontend build to backend (adjust if your backend serves static files from a specific folder)
- script: |
    cp -r dist server/dist
  displayName: 'Copy frontend build to backend'

# Compile TypeScript to JavaScript
- script: |
    cd server
    tsc --skipLibCheck index.ts --outDir dist --esModuleInterop true --module es2020 --moduleResolution node --target es2020
  displayName: 'Compile TypeScript to JavaScript'
# Create web.config for Azure deployment
- script: |
    echo '<?xml version="1.0" encoding="utf-8"?>
    <configuration>
      <system.webServer>
        <handlers>
          <add name="iisnode" path="server.js" verb="*" modules="iisnode" />
        </handlers>
        <rewrite>
          <rules>
            <rule name="StaticContent">
              <action type="Rewrite" url="dist{REQUEST_URI}" />
            </rule>
            <rule name="DynamicContent">
              <conditions>
                <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
              </conditions>
              <action type="Rewrite" url="server.js"/>
            </rule>
          </rules>
        </rewrite>
        <iisnode watchedFiles="web.config;*.js" nodeProcessCommandLine="node.exe" debuggingEnabled="false" />
      </system.webServer>
    </configuration>' > server/web.config
  displayName: 'Create web.config for Azure deployment'

# Create package.json in server folder if it doesn't have one
- script: |
    if [ ! -f server/package.json ]; then
      echo '{
        "name": "guardian-server",
        "version": "1.0.0",
        "type": "module",
        "scripts": {
          "start": "node server.js"
        },
        "engines": {
          "node": ">=20.0.0"
        }
      }' > server/package.json
    else
      # Update existing package.json to add start script
      jq '.scripts.start = "node server.js"' server/package.json > server/package.json.tmp
      mv server/package.json.tmp server/package.json
    fi
  displayName: 'Ensure proper package.json configuration'

# Zip backend for deployment
- script: |
    cd server
    zip -r ../app.zip .
  displayName: 'Zip backend and frontend build'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-DEV'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    startUpCommand: 'npm start'
    runtimeStack: 'NODE|20-lts'