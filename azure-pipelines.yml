# azure-pipelines.yml
trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    echo "Installing dependencies..."
    npm install
    echo "Building frontend..."
    npm run build
    echo "Building backend..."
    npm run build:server
    echo "Build completed. Listing dist directory contents:"
    ls -la dist
    echo "Assets directory:"
    ls -la dist/assets
    echo "Server directory contents:"
    ls -la dist-server
  displayName: 'Install dependencies and build'

- script: |
    mkdir -p deployment
    echo "Creating deployment directory structure"
  displayName: 'Prepare deployment directory'

- script: |
    echo "Creating simple deployment structure"
    echo "Copying ONLY the working dist folder to deployment root"
    cp -r dist/* deployment/
    echo "Copying server.js to deployment root"
    cp server.js deployment/
    echo "Deployment directory contents:"
    ls -la deployment
    echo "Assets directory:"
    ls -lah deployment/assets/
    echo "Verify JS file size:"
    wc -c deployment/assets/index-DiJh1OUG.js
    echo "File types:"
    file deployment/assets/*
  displayName: 'Copy build artifacts to deployment'

- script: |
    echo "Copying production server file (CommonJS)"
    cp server.cjs deployment/server.js
    echo "Production server file (CommonJS) copied to deployment as server.js"
    echo "Server file type:"
    head -1 deployment/server.js
    ls -la deployment/
  displayName: 'Copy production server file to deployment'

- script: |
    echo "Copying production package.json to deployment"
    cp package.production.json deployment/package.json
    echo "Production package.json (CommonJS) copied for Azure compatibility"
    echo "Package type:"
    grep '"type"' deployment/package.json
  displayName: 'Copy production package.json'

- script: |
    echo "Copying production .env file to deployment"
    if [ -f ".env.production" ]; then
      cp .env.production deployment/.env
      echo "Production .env file copied to deployment as .env"
      echo "First few lines of production .env file:"
      head -3 deployment/.env
    elif [ -f ".env" ]; then
      cp .env deployment/
      echo "Development .env file copied to deployment (fallback)"
      echo "First few lines of .env file:"
      head -3 deployment/.env
    else
      echo "No .env file found - this may cause database connection issues"
    fi
  displayName: 'Copy production .env file'

- script: |
    echo "Copying Prisma schema and related files"
    if [ -f "prisma/schema.prisma" ]; then
      mkdir -p deployment/prisma
      cp -r prisma/* deployment/prisma/
      echo "Prisma schema copied"
      ls -la deployment/prisma/
    else
      echo "No Prisma schema found - skipping"
    fi
  displayName: 'Copy Prisma files'

- script: |
    cd deployment
    echo "Configuring pure Node.js deployment"
    echo '[config]
    SCM_DO_BUILD_DURING_DEPLOYMENT=false' > .deployment
    echo "Creating web.config to force all requests to Node.js"
    cat > web.config << 'EOF'
    <?xml version="1.0" encoding="utf-8"?>
    <configuration>
      <system.webServer>
        <handlers>
          <add name="iisnode" path="server.js" verb="*" modules="iisnode"/>
        </handlers>
        <rewrite>
          <rules>
            <rule name="DynamicContent">
              <match url="/*" />
              <action type="Rewrite" url="server.js"/>
            </rule>
          </rules>
        </rewrite>
      </system.webServer>
    </configuration>
    EOF
    echo "Configuration complete - all requests will go to Node.js"
  displayName: 'Force all requests to Node.js'

- script: |
    cd deployment
    npm install
    echo "Installed server dependencies in deployment directory"
    
    # Always generate Prisma client fresh during deployment
    if [ -f "prisma/schema.prisma" ]; then
      echo "Generating Prisma client for deployment..."
      npx prisma generate
      echo "Prisma client generated successfully"
      ls -la node_modules/.prisma/client/
    else
      echo "No Prisma schema found - skipping client generation"
    fi
    
    ls -la node_modules
  displayName: 'Install server dependencies and generate Prisma client'

- script: |
    cd deployment
    zip -r ../app.zip .
    cd ..
    du -h app.zip
  displayName: 'Create deployment package'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'AzureSP-Dev'
    appType: 'webApp'
    appName: 'GUARDIAN-MVP'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    runtimeStack: 'NODE|20-lts'
  displayName: 'Deploy to Azure Web App'