trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Install and build frontend
- script: |
    npm install
    npm run build
  displayName: 'Install and build frontend'

# Install backend dependencies
- script: |
    cd server
    npm install
  displayName: 'Install backend dependencies'

# Clean old frontend build from backend
- script: |
    rm -rf server/dist
  displayName: 'Clean old frontend build from backend'

# Copy frontend build to backend (adjust if your backend serves static files from a specific folder)
- script: |
    cp -r dist server/dist
  displayName: 'Copy frontend build to backend'

# Zip backend for deployment
- script: |
    cd server
    zip -r ../app.zip .
  displayName: 'Zip backend and frontend build'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-DEV'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    runtimeStack: 'NODE|20-lts'