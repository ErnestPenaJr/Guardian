trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Install and build frontend
- script: |
    npm install
    npm run build
  displayName: 'Install and build frontend'

# Install backend dependencies
- script: |
    cd server
    npm install
  displayName: 'Install backend dependencies'

# Clean old frontend build from backend
- script: |
    rm -rf server/dist
  displayName: 'Clean old frontend build from backend'

# Copy frontend build to backend (adjust if your backend serves static files from a specific folder)
- script: |
    cp -r dist server/dist
  displayName: 'Copy frontend build to backend'
# Create web.config for Azure deployment
- script: |
    echo '<?xml version="1.0" encoding="utf-8"?>
    <configuration>
      <system.webServer>
        <handlers>
          <add name="iisnode" path="index.js" verb="*" modules="iisnode" />
        </handlers>
        <rewrite>
          <rules>
            <rule name="StaticContent">
              <action type="Rewrite" url="dist{REQUEST_URI}" />
            </rule>
            <rule name="DynamicContent">
              <conditions>
                <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
              </conditions>
              <action type="Rewrite" url="index.js"/>
            </rule>
          </rules>
        </rewrite>
        <iisnode watchedFiles="web.config;*.js" nodeProcessCommandLine="node.exe" debuggingEnabled="false" />
      </system.webServer>
    </configuration>' > server/web.config
  displayName: 'Create web.config for Azure deployment'

# Zip backend for deployment
- script: |
    cd server
    zip -r ../app.zip .
  displayName: 'Zip backend and frontend build'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-DEV'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    runtimeStack: 'NODE|20-lts'