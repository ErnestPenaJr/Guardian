trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Install and build frontend
- script: |
    npm install
    npm run build
    echo "Frontend build completed. Listing dist directory contents:"
    ls -la dist
  displayName: 'Install and build frontend'

# Install backend dependencies
- script: |
    cd server
    npm install
    npm install typescript -g
  displayName: 'Install backend dependencies'

# Prepare deployment directory
- script: |
    mkdir -p deployment
    rm -rf deployment/dist
    echo "Creating deployment directory structure"
  displayName: 'Prepare deployment directory'

# Install express and cors in deployment directory
- script: |
    cd deployment
    npm init -y
    npm install express cors --save
    echo "Installed express and cors in deployment directory"
  displayName: 'Install express and cors in deployment directory'

# Copy frontend build to deployment directory
- script: |
    echo "Copying frontend build to deployment/dist"
    cp -r dist deployment/
    ls -la deployment/dist
  displayName: 'Copy frontend build to deployment'

# Copy server.js to deployment root
- script: |
    echo "Copying server.js to deployment root"
    cp server.js deployment/
    ls -la deployment/
  displayName: 'Copy server.js to deployment'

# Update package.json for deployment
- script: |
    cd deployment
    node -e "const pkg = require('./package.json'); pkg.name = 'guardian-server'; pkg.version = '1.0.0'; pkg.scripts = pkg.scripts || {}; pkg.scripts.start = 'node server.js'; pkg.engines = { node: '>=20.0.0' }; require('fs').writeFileSync('./package.json', JSON.stringify(pkg, null, 2));"
    cat package.json
  displayName: 'Update package.json for deployment'

# Create web.config for Azure deployment
- script: |
    echo '<?xml version="1.0" encoding="utf-8"?>
    <configuration>
      <system.webServer>
        <handlers>
          <add name="iisnode" path="server.js" verb="*" modules="iisnode" />
        </handlers>
        <rewrite>
          <rules>
            <rule name="StaticContent">
              <action type="Rewrite" url="dist{REQUEST_URI}" />
            </rule>
            <rule name="DynamicContent">
              <conditions>
                <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
              </conditions>
              <action type="Rewrite" url="server.js"/>
            </rule>
          </rules>
        </rewrite>
        <iisnode watchedFiles="web.config;*.js" nodeProcessCommandLine="node.exe" debuggingEnabled="false" />
      </system.webServer>
    </configuration>' > deployment/web.config
  displayName: 'Create web.config for Azure deployment'

# Create a test HTML file to verify static file serving
- script: |
    echo '<html><head><title>Guardian Test Page</title></head><body><h1>Guardian Test Page</h1><p>If you can see this, static file serving is working.</p></body></html>' > deployment/dist/test.html
    echo "Created test.html in deployment/dist"
  displayName: 'Create test HTML file'

# Verify deployment package structure
- script: |
    echo "\n===== DEPLOYMENT PACKAGE STRUCTURE ====="
    ls -la deployment
    echo "\n===== DEPLOYMENT DIST DIRECTORY ====="
    ls -la deployment/dist
    echo "\n===== DEPLOYMENT NODE_MODULES ====="
    ls -la deployment/node_modules | head -n 10
  displayName: 'Verify deployment package structure'

# Zip deployment package
- script: |
    cd deployment
    zip -r ../app.zip .
    echo "Created deployment package: app.zip"
    cd ..
    du -h app.zip
  displayName: 'Create deployment package'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-DEV'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    startUpCommand: 'npm start'
    runtimeStack: 'NODE|20-lts'