# Azure Pipelines YAML for Guardian MVP
trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'

steps:
- task: NodeTool@0
  inputs:
    versionSpec: $(nodeVersion)
  displayName: 'Install Node.js $(nodeVersion)'

# Install dependencies and build frontend
- script: |
    echo "Installing dependencies..."
    npm install
    echo "Building frontend..."
    npm run build
    echo "Build completed. Checking dist directory:"
    ls -la dist/
  displayName: 'Build Frontend'

# Create deployment structure
- script: |
    echo "Creating deployment structure..."
    mkdir -p deployment
    
    # Copy frontend build
    cp -r dist deployment/
    
    # Copy server file
    cp azure-server.js deployment/
    
    # Copy prisma schema and migrations
    mkdir -p deployment/prisma
    cp prisma/schema.prisma deployment/prisma/
    if [ -d "prisma/migrations" ]; then
      cp -r prisma/migrations deployment/prisma/
    fi
    
    # Use the deployment-specific package.json
    cp azure-deployment-package.json deployment/package.json
    
    echo "Deployment structure created:"
    find deployment -type f | head -20
  displayName: 'Prepare Deployment Structure'

# Install production dependencies
- script: |
    cd deployment
    echo "Installing production dependencies..."
    npm install --only=production
    
    echo "Generating Prisma client..."
    npx prisma generate
    
    echo "Production dependencies installed:"
    ls -la node_modules/ | head -10
  displayName: 'Install Production Dependencies'

# Create deployment package
- script: |
    echo "Creating deployment package..."
    cd deployment
    zip -r ../guardian-mvp-deployment.zip . -x "*.git*" "*.DS_Store*" "*node_modules/.cache*"
    cd ..
    echo "Package created:"
    ls -lah guardian-mvp-deployment.zip
  displayName: 'Create Deployment Package'

# Deploy to Azure Web App
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-MVP'
    package: '$(System.DefaultWorkingDirectory)/guardian-mvp-deployment.zip'
    runtimeStack: 'NODE|20-lts'
    startUpCommand: 'npm start'
  displayName: 'Deploy to Azure Web App'