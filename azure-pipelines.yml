# azure-pipelines.yml
trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Install and build frontend
- script: |
    npm install
    npm run build
    echo "Frontend build completed. Listing dist directory contents:"
    ls -la dist
  displayName: 'Install and build frontend'

# Prepare deployment directory
- script: |
    mkdir -p deployment
    echo "Creating deployment directory structure"
  displayName: 'Prepare deployment directory'

# Copy frontend build to deployment directory
- script: |
    echo "Copying frontend build to deployment/dist"
    cp -r dist deployment/
    ls -la deployment/dist
  displayName: 'Copy frontend build to deployment'

# Copy azure-server.js to deployment root
- script: |
    echo "Copying azure-server.js to deployment root"
    cp azure-server.js deployment/
  displayName: 'Copy azure-server.js to deployment'

# Create .deployment file
- script: |
    echo '[config]
    SCM_DO_BUILD_DURING_DEPLOYMENT=true' > deployment/.deployment
    cat deployment/.deployment
  displayName: 'Create .deployment file'

# Create server-side package.json
- script: |
    cd deployment
    echo '{
      "name": "guardian-server",
      "version": "1.0.0",
      "type": "commonjs",
      "main": "azure-server.js",
      "scripts": {
        "start": "node azure-server.js"
      },
      "engines": {
        "node": ">=20.0.0"
      },
      "dependencies": {
        "express": "^4.21.2",
        "cors": "^2.8.5"
      }
    }' > package.json
    cat package.json
  displayName: 'Create server package.json'

# Install server dependencies
- script: |
    cd deployment
    npm install
    echo "Installed server dependencies in deployment directory"
    ls -la node_modules
  displayName: 'Install server dependencies'

# Zip deployment package
- script: |
    cd deployment
    zip -r ../app.zip .
    cd ..
    du -h app.zip
  displayName: 'Create deployment package'

# Deploy to Azure Web App
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-DEV'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    startUpCommand: 'npm start'
    runtimeStack: 'NODE|20-lts'
  displayName: 'Deploy to Azure Web App'