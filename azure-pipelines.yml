trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

# Install and build frontend
- script: |
    npm install
    npm run build
  displayName: 'Install and build frontend'

# Install backend dependencies and copy to root for deployment
- script: |
    cd server
    npm install
    npm install typescript -g
    cp -r node_modules ../node_modules
  displayName: 'Install backend dependencies'

# Clean old frontend build from deployment directory
- script: |
    mkdir -p deployment
    rm -rf deployment/dist
  displayName: 'Prepare deployment directory'

# Copy frontend build to deployment directory
- script: |
    cp -r dist deployment/
  displayName: 'Copy frontend build to deployment'

# Copy server.js to deployment root
- script: |
    cp server.js deployment/
  displayName: 'Copy server.js to deployment'

# Create package.json for deployment
- script: |
    echo '{
      "name": "guardian-server",
      "version": "1.0.0",
      "scripts": {
        "start": "node server.js"
      },
      "dependencies": {
        "express": "^4.18.2",
        "cors": "^2.8.5"
      },
      "engines": {
        "node": ">=20.0.0"
      }
    }' > deployment/package.json
  displayName: 'Create package.json for deployment'

# Copy dependencies to deployment
- script: |
    cp -r node_modules deployment/
  displayName: 'Copy dependencies to deployment'

# Create web.config for Azure deployment
- script: |
    echo '<?xml version="1.0" encoding="utf-8"?>
    <configuration>
      <system.webServer>
        <handlers>
          <add name="iisnode" path="server.js" verb="*" modules="iisnode" />
        </handlers>
        <rewrite>
          <rules>
            <rule name="StaticContent">
              <action type="Rewrite" url="dist{REQUEST_URI}" />
            </rule>
            <rule name="DynamicContent">
              <conditions>
                <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
              </conditions>
              <action type="Rewrite" url="server.js"/>
            </rule>
          </rules>
        </rewrite>
        <iisnode watchedFiles="web.config;*.js" nodeProcessCommandLine="node.exe" debuggingEnabled="false" />
      </system.webServer>
    </configuration>' > deployment/web.config
  displayName: 'Create web.config for Azure deployment'

# Zip deployment package
- script: |
    cd deployment
    zip -r ../app.zip .
  displayName: 'Create deployment package'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-DEV'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    startUpCommand: 'npm start'
    runtimeStack: 'NODE|20-lts'