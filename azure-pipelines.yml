# azure-pipelines.yml
trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npm run build
    echo "Frontend build completed. Listing dist directory contents:"
    ls -la dist
  displayName: 'Install and build frontend'

- script: |
    mkdir -p deployment
    echo "Creating deployment directory structure"
  displayName: 'Prepare deployment directory'

- script: |
    echo "Copying frontend build to deployment/dist"
    cp -r dist deployment/
    ls -la deployment/dist
  displayName: 'Copy frontend build to deployment'

- script: |
    echo "Copying azure-server.js to deployment root"
    cp azure-server.js deployment/server.js
  displayName: 'Copy azure-server.js to deployment'

- script: |
    echo "Copying deployment-package.json to deployment/package.json"
    cp deployment-package.json deployment/package.json
    cat deployment/package.json
  displayName: 'Copy deployment package.json'

- script: |
    echo "Copying Prisma schema and related files"
    if [ -f "prisma/schema.prisma" ]; then
      mkdir -p deployment/prisma
      cp -r prisma/* deployment/prisma/
      echo "Prisma schema copied"
      ls -la deployment/prisma/
    else
      echo "No Prisma schema found - skipping"
    fi
  displayName: 'Copy Prisma files'

- script: |
    echo '[config]
    SCM_DO_BUILD_DURING_DEPLOYMENT=true' > deployment/.deployment
    cat deployment/.deployment
  displayName: 'Create .deployment file'

- script: |
    cd deployment
    echo '<?xml version="1.0" encoding="utf-8"?>
    <configuration>
      <system.webServer>
        <handlers>
          <add name="iisnode" path="server.js" verb="*" modules="iisnode"/>
        </handlers>
        <rewrite>
          <rules>
            <rule name="NodeInspector" patternSyntax="ECMAScript" stopProcessing="true">
              <match url="^server.js\/debug[\/]?" />
            </rule>
            <rule name="StaticContent">
              <action type="Rewrite" url="public{REQUEST_URI}"/>
            </rule>
            <rule name="DynamicContent">
              <conditions>
                <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
              </conditions>
              <action type="Rewrite" url="server.js"/>
            </rule>
          </rules>
        </rewrite>
        <security>
          <requestFiltering>
            <hiddenSegments>
              <remove segment="bin"/>
            </hiddenSegments>
          </requestFiltering>
        </security>
        <httpErrors existingResponse="PassThrough" />
      </system.webServer>
    </configuration>' > web.config
  displayName: 'Create web.config'

- script: |
    cd deployment
    npm install
    echo "Installed server dependencies in deployment directory"
    
    # Generate Prisma client if schema exists
    if [ -f "prisma/schema.prisma" ]; then
      echo "Generating Prisma client..."
      npx prisma generate
      echo "Prisma client generated"
    else
      echo "No Prisma schema found - skipping client generation"
    fi
    
    ls -la node_modules
  displayName: 'Install server dependencies and generate Prisma client'

- script: |
    cd deployment
    zip -r ../app.zip .
    cd ..
    du -h app.zip
  displayName: 'Create deployment package'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'AzureSP-Dev'
    appType: 'webApp'
    appName: 'GUARDIAN-MVP'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    runtimeStack: 'NODE|20-lts'
  displayName: 'Deploy to Azure Web App'