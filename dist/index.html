<body>
  <div id="root">
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
      <h1>Guardian MVP</h1>
      <p>Loading...</p>
      <p><small>If this message persists, check the browser console for errors.</small></p>
    </div>
  </div>
  <script>
    // Basic error handler
    window.addEventListener('error', function(e) {
      console.error('Global error:', e.error);
      document.getElementById('root').innerHTML = '<div style="text-align: center; padding: 50px; color: red; font-family: Arial, sans-serif;"><h1>Application Error</h1><p>' + e.message + '</p><p>Check the browser console for more details.</p></div>';
    });
    
    // Module load error handler
    window.addEventListener('unhandledrejection', function(e) {
      console.error('Unhandled promise rejection:', e.reason);
      document.getElementById('root').innerHTML = '<div style="text-align: center; padding: 50px; color: red; font-family: Arial, sans-serif;"><h1>Module Load Error</h1><p>' + e.reason + '</p><p>Check the browser console for more details.</p></div>';
    });
  </script>
</body>
