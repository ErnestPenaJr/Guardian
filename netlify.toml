# Netlify build config — frontend (React/Vite) only.
# The Express backend (server.cjs / dist-server) and Postgres do NOT run on
# Netlify; host those separately and point the frontend at that API URL.

[build]
  # Build only the Vite frontend. Do NOT use build:all (that compiles the
  # backend) — Netlify can't run the server anyway.
  command = "npx prisma generate && npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 requires Node >= 20.19; pin a known-good LTS.
  NODE_VERSION = "22"
  # Skip lifecycle scripts during install. This bypasses the root "postinstall"
  # (prisma generate + build:all), which otherwise fails the build:
  #   - prisma generate can't find the root-level schema.prisma in CI
  #   - build:all compiles backend-only TypeScript Netlify doesn't need
  # esbuild 0.25 ships per-platform binaries via optionalDependencies, so the
  # frontend build still works without install scripts.
  NPM_FLAGS = "--ignore-scripts"

[functions]
  node_bundler = "esbuild"
  # Ship the generated Prisma client + Lambda query engine + schema inside the
  # Function bundle, and keep @prisma/client external so esbuild doesn't mangle
  # its engine resolution.
  included_files = [
    "node_modules/.prisma/client/**",
    "schema.prisma"
  ]
  external_node_modules = ["@prisma/client"]

# Route API + logout traffic to the serverless Function. These MUST be matched
# before the SPA catch-all below.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/logout"
  to = "/.netlify/functions/api/logout"
  status = 200

# SPA fallback: let React Router handle client-side routes so deep links and
# refreshes (e.g. /dashboard) don't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
