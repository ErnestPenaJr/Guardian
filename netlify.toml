# Netlify build config.
# Frontend: React/Vite static build (publish = dist), served by the CDN.
# Backend: the Express API runs as a serverless Function (netlify/functions/api.ts,
# a serverless-http wrapper of server/app.ts) on Postgres (Neon). /api/* and
# /logout are routed to it via the redirects below.

[build]
  # Build the Vite frontend (publish dir). The Function is bundled separately by
  # Netlify's esbuild bundler; `prisma generate` runs first so the Function has a
  # generated client + Lambda query engine to bundle.
  command = "npx prisma generate && npm run build"
  publish = "dist"

[build.environment]
  # Vite 7 requires Node >= 20.19; pin a known-good LTS.
  NODE_VERSION = "22"
  # Skip lifecycle scripts during install. This bypasses the root "postinstall"
  # (prisma generate + build:all), which otherwise fails the build:
  #   - prisma generate can't find the root-level schema.prisma in CI
  #   - build:all compiles backend-only TypeScript Netlify doesn't need
  # esbuild 0.25 ships per-platform binaries via optionalDependencies, so the
  # frontend build still works without install scripts.
  NPM_FLAGS = "--ignore-scripts"

[functions]
  node_bundler = "esbuild"
  # Ship the generated Prisma client + Lambda query engine + schema inside the
  # Function bundle, and keep @prisma/client external so esbuild doesn't mangle
  # its engine resolution.
  included_files = [
    "node_modules/.prisma/client/**",
    "schema.prisma"
  ]
  # @react-email/render is a lazy import() in resend, only used when sending
  # React-component emails (we send HTML strings), so it's never loaded — mark
  # it external so esbuild doesn't fail trying to bundle the uninstalled dep.
  external_node_modules = ["@prisma/client", "@react-email/render"]

# Route API + logout traffic to the serverless Function. These MUST be matched
# before the SPA catch-all below.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

# SPA fallback: let React Router handle client-side routes so deep links and
# refreshes (e.g. /dashboard) don't 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
