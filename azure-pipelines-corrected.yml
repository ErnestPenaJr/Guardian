# Azure DevOps Pipeline for Guardian MVP - Corrected Version
# This pipeline builds the React frontend, prepares the Node.js backend, and deploys to Azure Web App

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  appName: 'GUARDIAN-MVP'
  azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'

stages:
- stage: Build
  displayName: 'Build Application'
  jobs:
  - job: BuildJob
    displayName: 'Build Frontend and Backend'
    steps:
    
    # Install Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js $(nodeVersion)'

    # Cache node_modules for faster builds
    - task: Cache@2
      inputs:
        key: 'npm | "$(Agent.OS)" | package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
        path: node_modules
      displayName: 'Cache npm dependencies'

    # Install frontend dependencies and build
    - script: |
        echo "Installing frontend dependencies..."
        npm ci --production=false
        echo "Building frontend..."
        npm run build
        echo "Frontend build completed. Contents of dist:"
        ls -la dist/
      displayName: 'Install dependencies and build frontend'

    # Build backend TypeScript
    - script: |
        echo "Building backend TypeScript..."
        npm run build-server
        echo "Backend build completed. Contents of dist-server:"
        ls -la dist-server/
      displayName: 'Build backend TypeScript'

    # Prepare deployment directory
    - script: |
        echo "Creating deployment directory structure..."
        mkdir -p deployment
        
        # Copy built frontend to deployment
        echo "Copying frontend build..."
        cp -r dist deployment/
        
        # Copy backend files
        echo "Copying backend files..."
        cp -r dist-server/* deployment/
        cp azure-server.js deployment/
        cp deployment-package.json deployment/package.json
        
        # Copy Prisma schema and migrations
        echo "Copying Prisma files..."
        cp -r prisma deployment/
        
        # Copy environment template
        echo "Copying environment files..."
        cp .env deployment/.env.example
        
        # Copy any additional server assets
        if [ -d "server/emails" ]; then
          cp -r server/emails deployment/
        fi
        
        echo "Deployment directory contents:"
        ls -la deployment/
      displayName: 'Prepare deployment directory'

    # Create web.config for Azure App Service
    - script: |
        cd deployment
        cat > web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <handlers>
              <add name="iisnode" path="azure-server.js" verb="*" modules="iisnode" />
            </handlers>
            <rewrite>
              <rules>
                <rule name="StaticContent">
                  <match url="^dist/(.*)$" />
                  <action type="Rewrite" url="dist/{R:1}" />
                </rule>
                <rule name="NodeInspector" stopProcessing="true">
                  <match url="^azure-server.js\/debug[\/]?" />
                </rule>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                    <add input="{REQUEST_URI}" pattern="^/dist/" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="azure-server.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode 
              watchedFiles="web.config;*.js;dist/**/*"
              nodeProcessCommandLine="node.exe"
              debuggingEnabled="false"
              loggingEnabled="true"
              logDirectory="iisnode" />
            <defaultDocument>
              <files>
                <add value="azure-server.js" />
              </files>
            </defaultDocument>
          </system.webServer>
        </configuration>
        EOF
        echo "Created web.config:"
        cat web.config
      displayName: 'Create web.config for Azure'

    # Create startup script for Azure
    - script: |
        cd deployment
        cat > startup.sh << 'EOF'
        #!/bin/bash
        echo "Starting Guardian MVP application..."
        echo "Node version: $(node --version)"
        echo "NPM version: $(npm --version)"
        
        # Install production dependencies
        if [ ! -d "node_modules" ]; then
          echo "Installing production dependencies..."
          npm install --production
        fi
        
        # Generate Prisma client if needed
        if [ -f "prisma/schema.prisma" ]; then
          echo "Generating Prisma client..."
          npx prisma generate
        fi
        
        # Start the application
        echo "Starting application..."
        node azure-server.js
        EOF
        chmod +x startup.sh
        echo "Created startup script"
      displayName: 'Create startup script'

    # Archive deployment package
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/deployment'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/guardian-app.zip'
        replaceExistingArchive: true
      displayName: 'Create deployment package'

    # Publish build artifacts
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/guardian-app.zip'
        ArtifactName: 'guardian-app'
        publishLocation: 'Container'
      displayName: 'Publish build artifacts'

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to Azure Web App'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          
          # Download build artifacts
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'guardian-app'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download build artifacts'

          # Deploy to Azure Web App
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(System.ArtifactsDirectory)/guardian-app/guardian-app.zip'
              runtimeStack: 'NODE|20-lts'
              startUpCommand: 'bash startup.sh'
              appSettings: |
                -NODE_ENV production
                -WEBSITE_NODE_DEFAULT_VERSION 20.x
                -SCM_DO_BUILD_DURING_DEPLOYMENT false
                -ENABLE_ORYX_BUILD false
            displayName: 'Deploy to Azure Web App'

          # Verify deployment
          - script: |
              echo "Deployment completed. Waiting for application to start..."
              sleep 30
              echo "Attempting to verify deployment..."
              curl -f https://$(appName).azurewebsites.net/health || echo "Health check failed - application may still be starting"
            displayName: 'Verify deployment'
            continueOnError: true
