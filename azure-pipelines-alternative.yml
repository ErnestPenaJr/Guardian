# Alternative Azure DevOps Pipeline for Guardian MVP
# This version uses a different deployment approach to avoid file locking issues

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  appName: 'GUARDIAN-MVP'
  azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'

stages:
- stage: Build
  displayName: 'Build Application'
  jobs:
  - job: BuildJob
    displayName: 'Build Frontend and Backend'
    steps:
    
    # Install Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js $(nodeVersion)'

    # Install frontend dependencies and build
    - script: |
        echo "Installing frontend dependencies..."
        npm ci --production=false
        echo "Building frontend..."
        npm run build
        echo "Frontend build completed."
      displayName: 'Install dependencies and build frontend'

    # Build backend TypeScript
    - script: |
        echo "Building backend TypeScript..."
        npm run build-server
        echo "Backend build completed."
      displayName: 'Build backend TypeScript'

    # Prepare minimal deployment directory (without Prisma files initially)
    - script: |
        echo "Creating deployment directory structure..."
        mkdir -p deployment
        
        # Copy built frontend
        cp -r dist deployment/
        
        # Copy essential backend files only
        cp -r dist-server/* deployment/
        cp azure-server.js deployment/
        cp deployment-package.json deployment/package.json
        
        # Copy environment template (not the actual .env)
        cp .env deployment/.env.example
        
        # Create a minimal prisma directory structure
        mkdir -p deployment/prisma
        cp prisma/schema.prisma deployment/prisma/
        
        # Copy migrations if they exist
        if [ -d "prisma/migrations" ]; then
          cp -r prisma/migrations deployment/prisma/
        fi
        
        echo "Deployment directory prepared"
        ls -la deployment/
      displayName: 'Prepare deployment directory'

    # Create optimized web.config
    - script: |
        cd deployment
        cat > web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <handlers>
              <add name="iisnode" path="azure-server.js" verb="*" modules="iisnode" />
            </handlers>
            <rewrite>
              <rules>
                <rule name="StaticContent">
                  <match url="^dist/(.*)$" />
                  <action type="Rewrite" url="dist/{R:1}" />
                </rule>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                    <add input="{REQUEST_URI}" pattern="^/dist/" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="azure-server.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode 
              watchedFiles="web.config;*.js"
              nodeProcessCommandLine="node.exe"
              debuggingEnabled="false"
              loggingEnabled="true" />
          </system.webServer>
        </configuration>
        EOF
      displayName: 'Create web.config'

    # Archive deployment package
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/deployment'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/guardian-app.zip'
        replaceExistingArchive: true
      displayName: 'Create deployment package'

    # Publish build artifacts
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/guardian-app.zip'
        ArtifactName: 'guardian-app'
        publishLocation: 'Container'
      displayName: 'Publish build artifacts'

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to Azure Web App'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          
          # Download build artifacts
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'guardian-app'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download build artifacts'

          # Deploy using Run From Package method
          - task: AzureWebApp@1
            inputs:
              azureSubscription: '$(azureSubscription)'
              appType: 'webAppLinux'
              appName: '$(appName)'
              package: '$(System.ArtifactsDirectory)/guardian-app/guardian-app.zip'
              runtimeStack: 'NODE|20-lts'
              deploymentMethod: 'runFromPackage'
              appSettings: |
                -NODE_ENV production
                -WEBSITE_NODE_DEFAULT_VERSION 20.x
                -WEBSITE_RUN_FROM_PACKAGE 1
                -SCM_DO_BUILD_DURING_DEPLOYMENT false
                -ENABLE_ORYX_BUILD false
                -WEBSITE_RESTART_TIME 60
            displayName: 'Deploy to Azure Web App (Run From Package)'

          # Wait and verify deployment
          - script: |
              echo "Deployment completed. Waiting for application to start..."
              sleep 45
              echo "Attempting to verify deployment..."
              
              # Try to access the health endpoint
              response=$(curl -s -o /dev/null -w "%{http_code}" https://$(appName).azurewebsites.net/ || echo "000")
              echo "HTTP Response Code: $response"
              
              if [ "$response" = "200" ] || [ "$response" = "302" ]; then
                echo "✅ Application is responding successfully"
              else
                echo "⚠️ Application may still be starting up (HTTP $response)"
                echo "Check the application logs in Azure portal for more details"
              fi
            displayName: 'Verify deployment'
            continueOnError: true
