# Simplified Azure DevOps Pipeline for Guardian MVP
# This version avoids LinuxFxVersion issues by using Azure CLI deployment

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  appName: 'GUARDIAN-MVP'
  azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'

stages:
- stage: Build
  displayName: 'Build Application'
  jobs:
  - job: BuildJob
    displayName: 'Build Frontend and Backend'
    steps:
    
    # Install Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js $(nodeVersion)'

    # Install dependencies and build
    - script: |
        echo "Installing dependencies..."
        npm ci --production=false
        echo "Building frontend..."
        npm run build
        echo "Build completed."
      displayName: 'Install dependencies and build'

    # Create deployment package
    - script: |
        echo "Creating deployment package..."
        mkdir -p deployment-package
        
        # Copy essential files
        cp package.json deployment-package/
        cp azure-server.js deployment-package/
        cp -r dist deployment-package/ 2>/dev/null || echo "No dist directory found"
        cp -r node_modules deployment-package/ 2>/dev/null || echo "Will install dependencies on Azure"
        
        # Create zip package
        cd deployment-package
        zip -r ../guardian-deployment.zip . -x "*.git*" "*.DS_Store*"
        cd ..
        
        echo "Deployment package created: guardian-deployment.zip"
        ls -la guardian-deployment.zip
      displayName: 'Create deployment package'

    # Publish artifacts
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'guardian-deployment.zip'
        ArtifactName: 'guardian-deployment'
        publishLocation: 'Container'
      displayName: 'Publish deployment artifacts'

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to Azure Web App'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          
          # Download build artifacts
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'guardian-deployment'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download build artifacts'

          # Deploy using Azure CLI (avoids LinuxFxVersion issues)
          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Starting Azure deployment..."
                
                # Deploy the zip package
                echo "Deploying application package..."
                az webapp deployment source config-zip \
                  --name $(appName) \
                  --resource-group $(az webapp show --name $(appName) --query resourceGroup -o tsv) \
                  --src $(System.ArtifactsDirectory)/guardian-deployment/guardian-deployment.zip \
                  --timeout 600
                
                # Configure app settings (avoid problematic LinuxFxVersion)
                echo "Configuring app settings..."
                az webapp config appsettings set \
                  --name $(appName) \
                  --resource-group $(az webapp show --name $(appName) --query resourceGroup -o tsv) \
                  --settings \
                    NODE_ENV=production \
                    WEBSITE_NODE_DEFAULT_VERSION=~20 \
                    SCM_DO_BUILD_DURING_DEPLOYMENT=true \
                    ENABLE_ORYX_BUILD=true
                
                # Set startup command
                echo "Setting startup command..."
                az webapp config set \
                  --name $(appName) \
                  --resource-group $(az webapp show --name $(appName) --query resourceGroup -o tsv) \
                  --startup-file "npm start"
                
                echo "Deployment configuration completed successfully!"
            displayName: 'Deploy to Azure Web App'

          # Verify deployment
          - script: |
              echo "Waiting for application to start..."
              sleep 30
              
              echo "Verifying deployment..."
              for i in {1..3}; do
                echo "Attempt $i: Testing application..."
                response=$(curl -s -o /dev/null -w "%{http_code}" https://$(appName).azurewebsites.net/ || echo "000")
                echo "HTTP Response: $response"
                
                if [ "$response" = "200" ] || [ "$response" = "302" ]; then
                  echo "✅ Application is responding successfully!"
                  echo "🚀 Guardian MVP is live at: https://$(appName).azurewebsites.net"
                  break
                elif [ $i -eq 3 ]; then
                  echo "⚠️ Application may need more time to start"
                  echo "Check Azure portal for detailed logs"
                else
                  echo "Waiting 20 seconds before next attempt..."
                  sleep 20
                fi
              done
            displayName: 'Verify deployment'
            continueOnError: true
