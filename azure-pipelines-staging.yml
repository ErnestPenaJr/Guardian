# azure-pipelines.yml
trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    echo "Installing dependencies (skipping postinstall to avoid double build)..."
    npm install --ignore-scripts
    echo "Generating Prisma client..."
    npx prisma generate
    echo "Cleaning previous builds..."
    rm -rf dist dist-server
    echo "Building frontend..."
    npm run build
    echo "Building backend..."
    npm run build:server
    echo "Build completed. Listing dist directory contents:"
    ls -la dist
    echo "Assets directory:"
    ls -la dist/assets
    echo "Checking index.html for asset references:"
    grep -E "(index-.*\.js|index-.*\.css)" dist/index.html
    echo "Server directory contents:"
    ls -la dist-server
  displayName: 'Install dependencies and build'

- script: |
    mkdir -p deployment
    echo "Creating deployment directory structure"
  displayName: 'Prepare deployment directory'

- script: |
    echo "Creating simple deployment structure"
    echo "Copying ONLY the working dist folder to deployment root"
    cp -r dist/* deployment/
    echo "Copying server.js to deployment root"
    cp server.js deployment/
    echo "Deployment directory contents:"
    ls -la deployment
    echo "Asset verification details:"
    if [ -d "deployment/assets" ]; then
      echo "✅ Assets directory exists"
      echo "📊 Asset count: $(ls -1 deployment/assets/ | wc -l) files"
      echo "📜 JS files: $(ls -1 deployment/assets/*.js 2>/dev/null | wc -l)"
      echo "🎨 CSS files: $(ls -1 deployment/assets/*.css 2>/dev/null | wc -l)"
      echo "🖼️ Other files: $(ls -1 deployment/assets/ | grep -v -E '\.(js|css)$' | wc -l)"
      echo "💾 Total assets size: $(du -sh deployment/assets/ | cut -f1)"
      echo "Main asset files:"
      ls -lah deployment/assets/index-*
      echo "Verify JS file size:"
      wc -c deployment/assets/index-*.js
    else
      echo "❌ ERROR: Assets directory missing!"
      exit 1
    fi
    echo "Critical file verification:"
    [ -f "deployment/index.html" ] && echo "✅ index.html exists" || echo "❌ index.html missing"
    [ -f "deployment/server.js" ] && echo "✅ server.js exists" || echo "❌ server.js missing"
    echo "File types verification:"
    file deployment/assets/* 2>/dev/null || echo "No assets to verify"
  displayName: 'Copy build artifacts to deployment'

- script: |
    echo "Copying production server file to deployment"
    cp server-production.js deployment/server.js
    echo "Production server file copied to deployment as server.js"
    echo "Verifying server content - first 10 lines:"
    head -10 deployment/server.js
    echo "Server file type:"
    head -1 deployment/server.js
    echo "Verifying API routes are included:"
    grep -n "api/requests.*form" deployment/server.js || echo "API routes found"
    ls -la deployment/
  displayName: 'Copy production server file to deployment'

- script: |
    echo "Copying production package.json to deployment"
    cp package.production.json deployment/package.json
    echo "Production package.json (CommonJS) copied for Azure compatibility"
    echo "Package type:"
    grep '"type"' deployment/package.json
  displayName: 'Copy production package.json'

- script: |
    echo "Copying production .env file to deployment"
    if [ -f ".env.production" ]; then
      cp .env.production deployment/.env
      echo "Production .env file copied to deployment as .env"
      echo "First few lines of production .env file:"
      head -3 deployment/.env
    elif [ -f "env.staging" ]; then
      cp .env.staging deployment/.env
      echo "Staging .env file copied to deployment as .env"
      echo "First few lines of staging .env file:"
      head -3 deployment/.env
    elif [ -f ".env" ]; then
      cp .env deployment/
      echo "Development .env file copied to deployment (fallback)"
      echo "First few lines of .env file:"
      head -3 deployment/.env
    else
      echo "No .env file found - this may cause database connection issues"
    fi
  displayName: 'Copy production .env file'

- script: |
    echo "Copying Prisma schema and related files"
    if [ -f "prisma/schema.prisma" ]; then
      mkdir -p deployment/prisma
      cp -r prisma/* deployment/prisma/
      echo "Prisma schema copied"
      ls -la deployment/prisma/
    else
      echo "No Prisma schema found - skipping"
    fi
  displayName: 'Copy Prisma files'

- script: |
    echo "Copying web.config for IIS Node.js startup"
    cp web.config deployment/web.config
    echo "web.config copied to deployment"
  displayName: 'Copy web.config'

- script: |
    cd deployment
    echo "Configuring Node.js deployment"
    echo '[config]
    SCM_DO_BUILD_DURING_DEPLOYMENT=false' > .deployment
    echo "Configuration complete - Node.js serves static assets + API + SPA routing"
  displayName: 'Configure Node.js deployment'

- script: |
    cd deployment
    npm install
    echo "Installed server dependencies in deployment directory"
    
    # Always generate Prisma client fresh during deployment
    if [ -f "prisma/schema.prisma" ]; then
      echo "Generating Prisma client for deployment..."
      npx prisma generate
      echo "Prisma client generated successfully"
      ls -la node_modules/.prisma/client/
    else
      echo "No Prisma schema found - skipping client generation"
    fi
    
    ls -la node_modules
  displayName: 'Install server dependencies and generate Prisma client'

- script: |
    cd deployment
    zip -r ../app.zip .
    cd ..
    du -h app.zip
  displayName: 'Create deployment package'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'AzureSP-Dev'
    appType: 'webApp'
    appName: 'GUARDIAN-STAGING'
    package: '$(System.DefaultWorkingDirectory)/app.zip'
    runtimeStack: 'NODE|20-lts'
    deploymentMethod: 'zipDeploy'
  displayName: 'Deploy to Staging (GUARDIAN-STAGING)'

- script: |
    echo "Post-deployment verification starting..."
    echo "Waiting 30 seconds for deployment to stabilize..."
    sleep 30

    STAGING_URL="https://guardian-staging.azurewebsites.net/"

    echo "===== Staging ($STAGING_URL) ====="

    if curl -f -s --max-time 30 "$STAGING_URL/api/health" > /dev/null; then
      echo "  API health check PASSED"
    else
      echo "  API health check FAILED - server may still be starting"
    fi

    if curl -f -s --max-time 30 "$STAGING_URL/api/debug/assets" > /dev/null; then
      echo "  Asset verification PASSED"
    else
      echo "  Asset verification FAILED"
    fi

    if curl -f -s --max-time 30 "$STAGING_URL" > /dev/null; then
      echo "  Main page PASSED"
    else
      echo "  Main page FAILED"
    fi

    echo ""
    echo "Deployment complete"
    echo "  Staging: $STAGING_URL"
  displayName: 'Post-deployment verification'