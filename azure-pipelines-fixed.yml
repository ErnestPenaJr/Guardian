trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: 'GUARDIAN-DEV'
  AZURE_WEBAPP_PACKAGE_PATH: 'deployment'
  NODE_ENV: 'production'

steps:
# Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: $(NODE_VERSION)
  displayName: 'Install Node.js $(NODE_VERSION)'

# Install dependencies and build
- script: |
    echo "Installing dependencies..."
    npm ci
    
    echo "Building frontend..."
    npm run build
    
    echo "Building server..."
    npm run build:server
    
    echo "Build artifacts:"
    ls -la dist
    ls -la dist-server
  displayName: 'Install dependencies and build'

# Prepare deployment directory
- script: |
    echo "Preparing deployment directory..."
    mkdir -p deployment/dist
    
    # Copy frontend build
    echo "Copying frontend build..."
    cp -r dist/* deployment/dist/
    
    # Copy server build
    echo "Copying server build..."
    cp -r dist-server/* deployment/
    
    # Copy required files
    echo "Copying configuration files..."
    cp azure-server.cjs deployment/server.js
    cp prisma/schema.prisma deployment/
    cp prisma/schema.prisma deployment/prisma/
    
    # Copy environment configuration
    if [ -f ".env.production" ]; then
      cp .env.production deployment/.env
    else
      cp .env deployment/ 2>/dev/null || echo "No .env file found, using environment variables"
    fi
    
    echo "Deployment directory structure:"
    find deployment -type f | sort
  displayName: 'Prepare deployment package'

# Create deployment package.json
- script: |
    echo "Creating deployment package.json..."
    cp deployment-package.json deployment/package.json
    
    # Ensure production dependencies are installed
    cd deployment
    npm install --production
    
    echo "Generated package.json:"
    cat package.json
    
    echo "Installed production dependencies:"
    npm list --production --depth=0
  displayName: 'Configure deployment package'

# Deploy to Azure Web App
- task: AzureWebApp@1
  inputs:
    azureSubscription: '$(AZURE_SERVICE_CONNECTION)'
    appName: '$(AZURE_WEBAPP_NAME)'
    package: '$(AZURE_WEBAPP_PACKAGE_PATH)'
    runtimeStack: 'NODE|20-lts'
    startUpCommand: 'npm start'
  displayName: 'Deploy to Azure Web App'

# Verify deployment
- script: |
    echo "Verifying deployment..."
    STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://$(AZURE_WEBAPP_NAME).azurewebsites.net/api/health)
    echo "Health check status code: $STATUS_CODE"
    if [ "$STATUS_CODE" != "200" ]; then
      echo "##vso[task.logissue type=error]Deployment verification failed with status code $STATUS_CODE"
      exit 1
    fi
    echo "Deployment verified successfully!"
  displayName: 'Verify deployment'

# Install server dependencies in deployment directory
- script: |
    cd deployment
    npm install
    echo "Installed server dependencies in deployment directory"
    ls -la node_modules
  displayName: 'Install server dependencies in deployment directory'

# Create startup command file for Linux
- script: |
    cd deployment
    echo 'npm start' > startup.txt
    cat startup.txt
  displayName: 'Create startup command file'

# Zip the deployment package
- task: ArchiveFiles@2
  inputs:
    rootFolderOrFile: '$(System.DefaultWorkingDirectory)/deployment'
    includeRootFolder: false
    archiveType: 'zip'
    archiveFile: '$(Build.ArtifactStagingDirectory)/guardian-app.zip'
    replaceExistingArchive: true
  displayName: 'Create deployment package'

# Publish the deployment package
- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)/guardian-app.zip'
    ArtifactName: 'guardian-app'
    publishLocation: 'Container'
  displayName: 'Publish deployment package'

# Deploy to Azure Web App
- task: AzureWebApp@1
  inputs:
    azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'
    appType: 'webAppLinux'
    appName: 'GUARDIAN-MVP'
    runtimeStack: 'NODE|16-lts'  # Changed to 16-lts for better compatibility
    package: '$(Build.ArtifactStagingDirectory)/guardian-app.zip'
    startUpCommand: 'npm start'
    enableCustomDeployment: true
    deploymentMethod: 'auto'
  displayName: 'Deploy to Azure Web App'
