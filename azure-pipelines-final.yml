# Final Azure DevOps Pipeline for Guardian MVP
# This version completely avoids the Prisma file locking issue by using a clean deployment approach

trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  nodeVersion: '20.x'
  appName: 'GUARDIAN-MVP'
  azureSubscription: 'Microsoft Azure Sponsorship (3b5bdade-dfc5-4108-8325-658ac0d6c2c5)'

stages:
- stage: Build
  displayName: 'Build Application'
  jobs:
  - job: BuildJob
    displayName: 'Build Frontend and Backend'
    steps:
    
    # Install Node.js
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'
      displayName: 'Install Node.js $(nodeVersion)'

    # Install frontend dependencies and build
    - script: |
        echo "Installing frontend dependencies..."
        npm ci --production=false
        echo "Building frontend..."
        npm run build
        echo "Frontend build completed."
      displayName: 'Install dependencies and build frontend'

    # Build backend TypeScript
    - script: |
        echo "Building backend TypeScript..."
        npm run build-server
        echo "Backend build completed."
      displayName: 'Build backend TypeScript'

    # Create clean deployment structure without problematic files
    - script: |
        echo "Creating clean deployment directory..."
        mkdir -p clean-deployment
        
        # Copy built frontend
        echo "Copying frontend build..."
        cp -r dist clean-deployment/
        
        # Copy essential backend files
        echo "Copying backend files..."
        cp -r dist-server/* clean-deployment/
        cp azure-server.js clean-deployment/
        
        # Create a production package.json with all dependencies
        echo "Creating production package.json..."
        cat > clean-deployment/package.json << 'EOF'
        {
          "name": "guardian-server",
          "version": "1.0.0",
          "description": "Guardian MVP Server",
          "main": "azure-server.js",
          "type": "commonjs",
          "scripts": {
            "start": "node azure-server.js",
            "postinstall": "npx prisma generate || echo 'Prisma generate skipped'"
          },
          "dependencies": {
            "express": "^4.21.2",
            "cors": "^2.8.5",
            "body-parser": "^2.2.0",
            "bcryptjs": "^3.0.2",
            "jsonwebtoken": "^9.0.2",
            "passport": "^0.7.0",
            "passport-jwt": "^4.0.1",
            "passport-local": "^1.0.0",
            "@prisma/client": "^6.6.0",
            "@sendgrid/mail": "^8.1.4",
            "multer": "^1.4.5-lts.2",
            "zod": "^3.22.4",
            "prisma": "^6.6.0"
          },
          "engines": {
            "node": ">=20.0.0"
          }
        }
        EOF
        
        # Copy Prisma schema only (not the entire directory)
        echo "Setting up Prisma configuration..."
        mkdir -p clean-deployment/prisma
        cp prisma/schema.prisma clean-deployment/prisma/
        
        # Copy migrations as individual files to avoid directory locks
        if [ -d "prisma/migrations" ]; then
          echo "Copying migration files..."
          find prisma/migrations -name "*.sql" -exec cp {} clean-deployment/prisma/ \; 2>/dev/null || echo "No SQL migration files found"
        fi
        
        # Copy environment template
        cp .env clean-deployment/.env.example
        
        echo "Clean deployment directory prepared:"
        ls -la clean-deployment/
      displayName: 'Prepare clean deployment directory'

    # Create optimized web.config for Azure
    - script: |
        cd clean-deployment
        cat > web.config << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <configuration>
          <system.webServer>
            <handlers>
              <add name="iisnode" path="azure-server.js" verb="*" modules="iisnode" />
            </handlers>
            <rewrite>
              <rules>
                <rule name="StaticContent">
                  <match url="^dist/(.*)$" />
                  <action type="Rewrite" url="dist/{R:1}" />
                </rule>
                <rule name="DynamicContent">
                  <conditions>
                    <add input="{REQUEST_FILENAME}" matchType="IsFile" negate="True"/>
                    <add input="{REQUEST_URI}" pattern="^/dist/" negate="True"/>
                  </conditions>
                  <action type="Rewrite" url="azure-server.js"/>
                </rule>
              </rules>
            </rewrite>
            <iisnode 
              watchedFiles="web.config;*.js"
              nodeProcessCommandLine="node.exe"
              debuggingEnabled="false"
              loggingEnabled="true"
              logDirectory="iisnode" />
          </system.webServer>
        </configuration>
        EOF
        echo "Created web.config"
      displayName: 'Create web.config'

    # Archive clean deployment package
    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(System.DefaultWorkingDirectory)/clean-deployment'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/guardian-clean.zip'
        replaceExistingArchive: true
      displayName: 'Create clean deployment package'

    # Publish build artifacts
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/guardian-clean.zip'
        ArtifactName: 'guardian-clean'
        publishLocation: 'Container'
      displayName: 'Publish build artifacts'

- stage: Deploy
  displayName: 'Deploy to Azure'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy to Azure Web App'
    environment: 'production'
    strategy:
      runOnce:
        deploy:
          steps:
          
          # Download build artifacts
          - task: DownloadBuildArtifacts@0
            inputs:
              buildType: 'current'
              downloadType: 'single'
              artifactName: 'guardian-clean'
              downloadPath: '$(System.ArtifactsDirectory)'
            displayName: 'Download build artifacts'

          # Force stop the Azure Web App
          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Force stopping Azure Web App..."
                az webapp stop --name $(appName) --resource-group $(az webapp show --name $(appName) --query resourceGroup -o tsv) || echo "Stop command completed"
                echo "Waiting for complete shutdown..."
                sleep 20
            displayName: 'Force stop Azure Web App'
            continueOnError: true

          # Clean deployment using Azure CLI
          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Deploying clean package using Azure CLI..."
                az webapp deployment source config-zip \
                  --name $(appName) \
                  --resource-group $(az webapp show --name $(appName) --query resourceGroup -o tsv) \
                  --src $(System.ArtifactsDirectory)/guardian-clean/guardian-clean.zip \
                  --timeout 600
                echo "Deployment completed"
            displayName: 'Deploy using Azure CLI'

          # Configure app settings
          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Configuring app settings..."
                az webapp config appsettings set \
                  --name $(appName) \
                  --resource-group $(az webapp show --name $(appName) --query resourceGroup -o tsv) \
                  --settings \
                    NODE_ENV=production \
                    WEBSITE_NODE_DEFAULT_VERSION=20.x \
                    SCM_DO_BUILD_DURING_DEPLOYMENT=false \
                    ENABLE_ORYX_BUILD=false \
                    WEBSITE_RUN_FROM_PACKAGE=0 \
                    WEBSITE_RESTART_TIME=60
                echo "App settings configured"
            displayName: 'Configure app settings'

          # Start the Azure Web App
          - task: AzureCLI@2
            inputs:
              azureSubscription: '$(azureSubscription)'
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                echo "Starting Azure Web App..."
                az webapp start --name $(appName) --resource-group $(az webapp show --name $(appName) --query resourceGroup -o tsv)
                echo "Web App started"
            displayName: 'Start Azure Web App'

          # Verify deployment
          - script: |
              echo "Waiting for application to fully start..."
              sleep 60
              echo "Verifying deployment..."
              
              # Test the application endpoint
              for i in {1..5}; do
                echo "Attempt $i: Testing application..."
                response=$(curl -s -o /dev/null -w "%{http_code}" https://$(appName).azurewebsites.net/ || echo "000")
                echo "HTTP Response: $response"
                
                if [ "$response" = "200" ] || [ "$response" = "302" ]; then
                  echo "✅ Application is responding successfully!"
                  break
                elif [ $i -eq 5 ]; then
                  echo "⚠️ Application may need more time to start"
                  echo "Check Azure portal logs for details"
                else
                  echo "Waiting 15 seconds before next attempt..."
                  sleep 15
                fi
              done
            displayName: 'Verify deployment'
            continueOnError: true
